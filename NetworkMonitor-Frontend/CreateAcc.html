<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0f172a;
    --card-bg:#111827;
    --card-border:#1f2937;
    --text-main:#ffffff;
    --text-sub:#94a3b8;
    --label-color:#cbd5e1;
    --input-bg:#1e293b;
    --input-border:#334155;
    --placeholder-color:#64748b;
    --accent:#38bdf8;
    --accent-hover:#0ea5e9;
    --shadow:rgba(0,0,0,.35);
}

[data-theme="light"]{
    --bg:#f1f5f9;
    --card-bg:#ffffff;
    --card-border:#e2e8f0;
    --text-main:#0f172a;
    --text-sub:#64748b;
    --label-color:#334155;
    --input-bg:#f8fafc;
    --input-border:#cbd5e1;
    --placeholder-color:#94a3b8;
    --accent:#0ea5e9;
    --accent-hover:#0284c7;
    --shadow:rgba(15,23,42,.1);
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    font-family:'Segoe UI',sans-serif;
    color:var(--text-main);
    padding:20px;
    transition:background .3s ease,color .3s ease;
}

.theme-toggle-btn{
    position:fixed;
    top:20px;
    right:20px;
    width:46px;
    height:46px;
    border-radius:50%;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    color:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    transition:all .3s ease;
    box-shadow:0 4px 12px var(--shadow);
}

.theme-toggle-btn:hover{
    transform:scale(1.08);
}

.register-card{
    width:100%;
    max-width:550px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px var(--shadow);
    transition:background .3s ease,border-color .3s ease;
}

.system-title{
    text-align:center;
    font-size:30px;
    font-weight:700;
    margin-bottom:8px;
    color:var(--text-main);
}

.system-subtitle{
    text-align:center;
    color:var(--text-sub);
    margin-bottom:30px;
}

.form-label{
    color:var(--label-color);
    font-weight:500;
}

.form-control{
    height:50px;
    background:var(--input-bg);
    border:1px solid var(--input-border);
    color:var(--text-main);
    border-radius:12px;
    transition:background .3s ease,border-color .3s ease,color .3s ease;
}

.form-control::placeholder{
    color:var(--placeholder-color);
}

.form-control:focus{
    background:var(--input-bg);
    color:var(--text-main);
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(56,189,248,.15);
}

.input-group-text{
    background:var(--input-bg);
    border:1px solid var(--input-border);
    color:var(--accent);
    cursor:pointer;
    transition:background .3s ease,border-color .3s ease;
}

.btn-register{
    height:52px;
    background:var(--accent);
    color:white;
    border:none;
    border-radius:12px;
    font-weight:700;
    transition:background .3s ease;
}

.btn-register:hover{
    background:var(--accent-hover);
}

.login-link{
    text-align:center;
    margin-top:20px;
    color:var(--text-sub);
}

.login-link a{
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
}

.login-link a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle theme">
    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
</button>

<div class="register-card">
    <h2 class="system-title">
        Create Account </h2>
    <form id="createAccountForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Enter Username"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input
                type="tel"
                id="phoneNumber"
                class="form-control"
                placeholder="Enter Phone Number"
                required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Enter Password"
                    required>
                <span
                    class="input-group-text"
                    onclick="togglePassword('password','eye1')">
                    <i class="bi bi-eye" id="eye1"></i>
                </span>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>
                <span
                    class="input-group-text"
                    onclick="togglePassword('confirmPassword','eye2')">
                    <i class="bi bi-eye" id="eye2"></i>
                </span>
            </div>
        </div>
        <button
            type="submit"
            class="btn btn-register w-100">
            Create Account
        </button>
    </form>
    <div class="login-link">
        Already have an account?
        <a href="LoginPage.html">Login</a>
    </div>
</div>
<script>
// ✅ FIXED: Register API endpoint
const backendUrl = "http://192.168.121.128:8000/api/auth/register/";

// ---- Theme Toggle Logic ----
function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    const icon = document.getElementById("themeIcon");
    if(theme === "light"){
        icon.classList.replace("bi-moon-stars-fill","bi-sun-fill");
    }else{
        icon.classList.replace("bi-sun-fill","bi-moon-stars-fill");
    }
    localStorage.setItem("theme", theme);
}

function toggleTheme(){
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
}

// Load saved theme on page load (defaults to dark)
const savedTheme = localStorage.getItem("theme") || "dark";
applyTheme(savedTheme);

// ---- Password Toggle Logic ----
function togglePassword(inputId, eyeId){
    const input=document.getElementById(inputId);
    const eye=document.getElementById(eyeId);
    if(input.type==="password"){
        input.type="text";
        eye.classList.replace("bi-eye","bi-eye-slash");
    }else{
        input.type="password";
        eye.classList.replace("bi-eye-slash","bi-eye");
    }
}

// ---- Registration Form Submit ----
document.getElementById("createAccountForm").addEventListener("submit", async function(event){
    event.preventDefault();
    const username=document.getElementById("username").value;
    const phoneNumber=document.getElementById("phoneNumber").value;
    const password=document.getElementById("password").value;
    const confirmPassword=document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Password aur Confirm Password same nahi hai");
        return;
    }

    try{
        const response=await fetch(backendUrl,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:username,
                phone_number:phoneNumber,
                password:password,
                confirm_password:confirmPassword
            })
        });
        const data=await response.json();

        if(response.ok){
            alert("Account created successfully");
            console.log(data);
            // Redirect to login page after success (optional)
            // window.location.href = "LoginPage.html";
        }else{
            alert(data.message || data.detail || "Account creation failed");
        }
    }catch(error){
        alert("Server connection failed");
        console.error(error);
    }
});
</script>
</body>
</html>
