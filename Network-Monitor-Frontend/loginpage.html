<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Device Monitoring System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/theme-variables.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    font-family:'Segoe UI',sans-serif;
    color:var(--text-main);
}

.login-card{
    width:100%;
    max-width:450px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px var(--shadow);
    transition:background .3s ease,border-color .3s ease;
}

.system-title{
    text-align:center;
    font-size:30px;
    font-weight:700;
    color:var(--text-main);
    margin-bottom:8px;
}

.system-subtitle{
    text-align:center;
    color:var(--text-sub);
    margin-bottom:30px;
}

.form-label{
    color:var(--label-color);
    font-weight:500;
    margin-bottom:8px;
}

.form-control{
    height:52px;
    background:var(--input-bg);
    border:1px solid var(--input-border);
    color:var(--text-main);
    border-radius:12px;
    transition:background .3s ease,border-color .3s ease,color .3s ease;
}

.form-control::placeholder{
    color:var(--placeholder-color);
}

.form-control:focus{
    background:var(--input-bg);
    color:var(--text-main);
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(56,189,248,.15);
}

.input-group-text{
    background:var(--input-bg);
    border:1px solid var(--input-border);
    color:var(--accent);
    cursor:pointer;
    transition:background .3s ease,border-color .3s ease;
}

.btn-login{
    height:52px;
    border:none;
    border-radius:12px;
    background-color:var(--accent-hover);
    font-weight:600;
    font-size:16px;
    transition:.3s;
}

.btn-login:hover{
    transform:translateY(-2px);
    background:linear-gradient(135deg,var(--accent),var(--accent-hover));
}

.create-account{
    text-align:center;
    margin-top:20px;
    color:var(--text-sub);
}

.create-account a{
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
}

.create-account a:hover{
    text-decoration:underline;
}

.footer-text{
    margin-top:25px;
    text-align:center;
    color:var(--placeholder-color);
    font-size:14px;
}

.live-status{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-bottom:25px;
    color:var(--accent);
    font-size:14px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--success);
    box-shadow:0 0 10px var(--success);
}
</style>
</head>

<body>
    <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme">
    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
</button>

<div class="login-card">
    <h2 class="system-title">
        Device Monitoring
    </h2>

    <p class="system-subtitle">
        Secure Login Portal
    </p>

    <!-- Error / brute force message area -->
    <div id="errorMsg" class="error-message"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Enter username"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter password"
                    required>
                <span
                    class="input-group-text"
                    onclick="togglePassword()">
                    <i id="eyeIcon" class="bi bi-eye"></i>
                </span>
            </div>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-login w-100 text-white">
            Login
        </button>
    </form>

    <div class="create-account">
        Don't have an account?
        <a href="CreateAcc.html">Create Account</a>
    </div>

    <div class="footer-text">
        509 Army Base - Network Monitoring
    </div>
</div>
<script src="js/theme.js"></script>
<script>
    
// ---------- API Endpoints ----------
const loginUrl = "http://192.168.121.128:8000/api/auth/login/";
const bruteStatusUrl = "http://192.168.121.128:8000/api/brute-force/status/";

let isBlocked = false;       // true if current IP is banned

// ---------- Password Toggle ----------
function togglePassword(){
    const password = document.getElementById("password");
    const eye = document.getElementById("eyeIcon");
    if(password.type === "password"){
        password.type = "text";
        eye.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        password.type = "password";
        eye.classList.replace("bi-eye-slash", "bi-eye");
    }
}

// ---------- Brute Force Status Check (GET) ----------
async function checkBruteForceStatus() {
    try {
        //  GET request as per your endpoint specification
        const response = await fetch(bruteStatusUrl, {
            method: "GET",
            headers: { "Content-Type": "application/json" }
        });

        if (!response.ok) {
            // If endpoint returns error (e.g., 405 Method Not Allowed),
            // we silently ignore and keep login enabled.
            console.warn("Brute force status endpoint returned", response.status);
            return;
        }

        const data = await response.json();
        console.log("Brute Force Status:", data);   // debug in console

        // Extract values (adjust keys to match actual JSON)
        const blocked = data.is_blocked || data.blocked || false;
        const attempts = data.attempts ?? 0;
        const maxAttempts = data.max_attempts ?? 3;
        const remainingTime = data.remaining_time || data.ban_time_left || null;

        const errorEl = document.getElementById("errorMsg");
        const loginBtn = document.getElementById("loginBtn");

        if (blocked) {
            isBlocked = true;
            loginBtn.disabled = true;
            let msg = " Aapka IP temporarily block hai. ";
            if (remainingTime) {
                msg += `Kripya ${remainingTime} seconds baad try karein.`;
            } else {
                msg += "Kuch der baad try karein.";
            }
            errorEl.textContent = msg;
            errorEl.style.display = "block";
        } else {
            isBlocked = false;
            loginBtn.disabled = false;
            if (attempts > 0 && maxAttempts > 0) {
                const left = maxAttempts - attempts;
                errorEl.textContent = `⚠️ ${left} attempts bache hain.`;
                errorEl.style.display = "block";
            } else {
                errorEl.style.display = "none";
            }
        }
    } catch (err) {
        console.error("Brute force check failed:", err);
        // If API call fails completely, we don't block the user
    }
}

// ---------- Login Form Submission ----------
document.getElementById("loginForm").addEventListener("submit", async function(event){
    event.preventDefault();

    // If already known to be blocked, prevent login
    if (isBlocked) {
        alert("Aapka IP block hai. Login temporarily unavailable.");
        return;
    }

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch(loginUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            // Successful login
            alert("Login successful");
            console.log(data);

            // Store tokens if available
            if (data.access) localStorage.setItem("accessToken", data.access);
            if (data.refresh) localStorage.setItem("refreshToken", data.refresh);

            // Redirect to dashboard (change if needed)
            window.location.href = "dashboard.html";
        } else {
            // Failed login attempt
            const errorMessage = data.message || data.detail || "Invalid credentials.";
            alert(errorMessage);

            // Immediately re-check brute force status (attempts may have increased)
            await checkBruteForceStatus();
        }
    } catch (error) {
        alert("Server connection failed");
        console.error(error);
        // Attempt to refresh status
        await checkBruteForceStatus();
    }
});

// ---------- Initial Check on Page Load ----------
window.addEventListener("DOMContentLoaded", checkBruteForceStatus);

</script>

</body>
</html>
